<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Block Fusion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient background particles -->
  <canvas id="bg-canvas"></canvas>

  <!-- Header -->
  <header id="header">
    <div class="logo">
      <span class="logo-block"></span>
      <span class="logo-text">Block<em>Fusion</em></span>
    </div>
    <div class="header-controls">
      <button class="icon-btn" id="btn-sound" title="Toggle Sound" aria-label="Toggle Sound">
        <svg id="icon-sound-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        <svg id="icon-sound-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
      </button>
      <button class="icon-btn" id="btn-pause" title="Pause" aria-label="Pause Game">
        <svg id="icon-pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        <svg id="icon-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button class="icon-btn" id="btn-new" title="New Game" aria-label="New Game">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.37"/></svg>
      </button>
    </div>
  </header>

  <!-- Main layout -->
  <main id="main">
    <!-- Left panel: stats -->
    <aside id="panel-left">
      <div class="stat-card" id="card-score">
        <div class="stat-label">SCORE</div>
        <div class="stat-value" id="display-score">0</div>
      </div>
      <div class="stat-card" id="card-best">
        <div class="stat-label">BEST</div>
        <div class="stat-value" id="display-best">0</div>
      </div>
      <div class="stat-card combo-card" id="card-combo">
        <div class="stat-label">COMBO</div>
        <div class="stat-value" id="display-combo">×1</div>
        <div class="combo-bar-wrap"><div class="combo-bar" id="combo-bar"></div></div>
      </div>
      <div class="stat-card" id="card-lines">
        <div class="stat-label">LINES</div>
        <div class="stat-value" id="display-lines">0</div>
      </div>
    </aside>

    <!-- Center: game board -->
    <section id="board-wrap">
      <div id="board-container">
        <canvas id="board-canvas"></canvas>
        <!-- Score popup overlay -->
        <div id="popup-layer"></div>
      </div>
    </section>

    <!-- Right panel: next pieces tray -->
    <aside id="panel-right">
      <div class="tray-label">PIECES</div>
      <div id="pieces-tray">
        <div class="piece-slot" id="piece-slot-0"></div>
        <div class="piece-slot" id="piece-slot-1"></div>
        <div class="piece-slot" id="piece-slot-2"></div>
      </div>
    </aside>
  </main>

  <!-- Pieces tray on mobile (bottom) -->
  <div id="mobile-tray">
    <div class="tray-label">PIECES</div>
    <div id="mobile-pieces-row">
      <div class="piece-slot" id="mobile-piece-slot-0"></div>
      <div class="piece-slot" id="mobile-piece-slot-1"></div>
      <div class="piece-slot" id="mobile-piece-slot-2"></div>
    </div>
  </div>

  <!-- Drag ghost -->
  <canvas id="drag-ghost"></canvas>

  <!-- Pause overlay -->
  <div id="overlay-pause" class="overlay hidden">
    <div class="overlay-card">
      <h2>Paused</h2>
      <p>Take a breather ✨</p>
      <button class="btn-primary" id="btn-resume">Resume</button>
      <button class="btn-secondary" id="btn-restart-pause">New Game</button>
    </div>
  </div>

  <!-- Game Over overlay -->
  <div id="overlay-gameover" class="overlay hidden">
    <div class="overlay-card">
      <div class="go-icon">☠</div>
      <h2>Game Over</h2>
      <div class="go-score-section">
        <div class="go-row">
          <span class="go-label">Score</span>
          <span class="go-val" id="go-score">0</span>
        </div>
        <div class="go-row">
          <span class="go-label">Best</span>
          <span class="go-val" id="go-best">0</span>
        </div>
        <div class="go-row">
          <span class="go-label">Lines</span>
          <span class="go-val" id="go-lines">0</span>
        </div>
      </div>
      <div id="new-best-badge" class="hidden">🏆 New Best!</div>
      <button class="btn-primary" id="btn-play-again">Play Again</button>
    </div>
  </div>

  <!-- Score popup template (cloned by JS) -->
  <div id="score-popup-template" class="score-popup hidden">+0</div>

  <script src="script.js"></script>
</body>
</html>
